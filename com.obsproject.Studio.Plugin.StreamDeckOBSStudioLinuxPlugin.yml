id: com.obsproject.Studio.Plugin.StreamDeckOBSStudioLinuxPlugin
branch: stable
runtime: com.obsproject.Studio
runtime-version: stable
sdk: org.freedesktop.Sdk//25.08
build-extension: true
separate-locales: false
build-options:
  prefix: /app/plugins/StreamDeckOBSStudioLinuxPlugin
  strip: true

modules:
  - name: obs-streamdeck-linux-plugin
    buildsystem: simple
    builddir: true
    build-commands:
      # Configure
      - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    
      # Build
      - cmake --build build

    post-install:
    - install -Dm0644 com.obsproject.Studio.Plugin.StreamDeckOBSStudioLinuxPlugin.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
    - mkdir -p ${FLATPAK_DEST}/share/obs/obs-plugins/StreamDeckPlugin/locale/
    - install  data/locale/de-DE.ini -t ${FLATPAK_DEST}/share/obs/obs-plugins/StreamDeckPlugin/locale/
    - install  data/locale/en-US.ini -t ${FLATPAK_DEST}/share/obs/obs-plugins/StreamDeckPlugin/locale/
    - install -Dm0644 build/libStreamDeckPlugin.so ${FLATPAK_DEST}/lib/obs-plugins/libStreamDeckPlugin.so

    sources:
      - type: git
        url: https://github.com/LinuxGamesTV/streamdeck-obs-linux-plugin2.git
        tags: "5.5.4.0"
        commit: 27361964f4aac9e68c6313db112ab05014bc6e2f
        
        x-checker-data:
          type: git
          is-main-source: true
          tag-pattern: ^([\d.]+)$
          
      - type: file
        path: com.obsproject.Studio.Plugin.StreamDeckOBSStudioLinuxPlugin.metainfo.xml
